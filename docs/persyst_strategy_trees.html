<style>
  /* ---- reset & layout ---- */
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#f0f4f8;color:#1a202c;font-family:'Computer Modern','CMU Serif',Georgia,serif;overflow:hidden}

  /* ---- tab bar ---- */
  #tab-bar{display:flex;gap:4px;padding:8px 14px 0;background:#fff;border-bottom:2px solid #e2e8f0;flex-shrink:0;overflow-x:auto;min-height:46px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .tab{padding:7px 18px;border-radius:6px 6px 0 0;cursor:pointer;font-size:13.5px;white-space:nowrap;background:#f0f4f8;color:#64748b;border:1px solid transparent;border-bottom:none;transition:background .15s,color .15s;font-family:'Computer Modern','CMU Serif',Georgia,serif}
  .tab:hover{background:#e2e8f0;color:#334155}
  .tab.active{background:#fff;color:#1d4ed8;border-color:#e2e8f0;border-bottom:2px solid #fff;font-weight:700;margin-bottom:-2px}

  /* ---- main split ---- */
  #main{display:flex;height:calc(100% - 46px)}
  #canvas-wrap{flex:1;position:relative;overflow:hidden}
  svg#tree-svg{width:100%;height:100%;display:block;background:#fff}

  /* ---- detail panel ---- */
  #detail{width:360px;min-width:280px;background:#fff;border-left:2px solid #e2e8f0;overflow-y:auto;padding:20px 18px;flex-shrink:0;transition:width .2s;box-shadow:-3px 0 12px rgba(0,0,0,.06)}
  #detail.collapsed{width:0;padding:0;overflow:hidden}
  #detail h2{font-size:14.5px;font-weight:700;margin-bottom:14px;color:#1d4ed8;word-break:break-all;padding-right:26px;line-height:1.4;font-family:'Computer Modern','CMU Serif',Georgia,serif}
  .detail-section{margin-bottom:16px}
  .detail-section h3{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#94a3b8;margin-bottom:6px;font-weight:600;font-family:'Segoe UI',system-ui,sans-serif}
  .detail-section p{font-size:12.5px;line-height:1.65;color:#374151;font-family:'Computer Modern','CMU Serif',Georgia,serif}
  .detail-section pre{font-size:11.5px;line-height:1.6;color:#374151;white-space:pre-wrap;word-break:break-word;background:#f8fafc;padding:10px 12px;border-radius:6px;border:1px solid #e2e8f0;font-family:'Cascadia Code','Fira Mono',monospace}
  .metric-expr{font-size:11.5px;line-height:1.6;color:#5b21b6;font-family:'Cascadia Code','Fira Mono',monospace;background:#faf5ff;padding:10px 12px;border-radius:6px;border:1px solid #e9d5ff;white-space:pre-wrap;word-break:break-word}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:8px;letter-spacing:.02em;font-family:'Segoe UI',system-ui,sans-serif}
  .badge-none{background:#dcfce7;color:#14532d}
  .badge-bottleneck{background:#fee2e2;color:#7f1d1d}
  .badge-decision{background:#dbeafe;color:#1e3a8a}
  .badge-root{background:#fef9c3;color:#713f12}
  .badge-type{background:#f1f5f9;color:#5b21b6;font-weight:500;font-size:10px;padding:1px 7px;border-radius:3px;vertical-align:middle;margin-left:5px;font-family:'Segoe UI',system-ui,sans-serif}
  #close-btn{position:absolute;top:18px;right:16px;cursor:pointer;font-size:17px;line-height:1;color:#94a3b8;background:none;border:none;padding:2px 5px;border-radius:4px}
  #close-btn:hover{background:#f1f5f9;color:#374151}
  .kv{display:flex;gap:8px;margin-bottom:4px}
  .kv-key{color:#94a3b8;font-size:12px;min-width:90px;flex-shrink:0;font-weight:500;font-family:'Segoe UI',system-ui,sans-serif}
  .kv-val{color:#374151;font-size:12px;word-break:break-all;font-family:'Computer Modern','CMU Serif',Georgia,serif}

  /* ---- hint overlay ---- */
  #hint{position:absolute;bottom:14px;left:14px;font-size:11px;color:#94a3b8;pointer-events:none;line-height:1.8;background:rgba(255,255,255,.85);padding:6px 10px;border-radius:6px;backdrop-filter:blur(4px);font-family:'Segoe UI',system-ui,sans-serif}

  /* ---- node highlight (CSS overrides SVG presentation attrs) ---- */
  .node-highlight .node-shape{stroke:#1d4ed8 !important;stroke-width:2.5px !important;filter:drop-shadow(0 0 8px rgba(29,78,216,.3)) !important}
</style>

// ============================================================
// Layout constants
// ============================================================
const NODE_W  = 170;
const NODE_H  = 52;
const H_GAP   = 230;
const V_GAP   = 68;
const CORNER  = 8;

// Node visual styles
const STYLE = {
  root:       { fill: '#dbeafe', stroke: '#2563eb', rx: CORNER,     fw: 700 },
  decision:   { fill: '#ffffff', stroke: '#475569', rx: CORNER,     fw: 400 },
  leaf_none:  { fill: '#dcfce7', stroke: '#16a34a', rx: NODE_H / 2, fw: 700 },
  leaf_other: { fill: '#fee2e2', stroke: '#dc2626', rx: CORNER,     fw: 500 },
};

function nodeStyle(d) {
  if (d.kind === 'root')                                  return STYLE.root;
  if (d.kind === 'decision')                              return STYLE.decision;
  if (d.kind === 'leaf' && d.bottleneck_type === 'NONE')  return STYLE.leaf_none;
  return STYLE.leaf_other;
}

// ============================================================
// State
// ============================================================
let selectedNode = null;

// ============================================================
// Tab bar
// ============================================================
const tabBar = document.getElementById('tab-bar');
TREES.forEach((tree, i) => {
  const tab = document.createElement('div');
  tab.className = 'tab' + (i === 0 ? ' active' : '');
  tab.textContent = tree.tree_name;
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderTree(i);
  });
  tabBar.appendChild(tab);
});

// ============================================================
// Detail panel
// ============================================================
const detail      = document.getElementById('detail');
const detailBody  = document.getElementById('detail-body');
const detailTitle = document.getElementById('detail-title');

document.getElementById('close-btn').addEventListener('click', closeDetail);

function closeDetail() {
  detail.classList.add('collapsed');
  if (selectedNode) { selectedNode.classed('node-highlight', false); selectedNode = null; }
}

function kv(key, val) {
  if (val === '' || val === null || val === undefined) return '';
  return `<div class="kv"><span class="kv-key">${esc(key)}</span><span class="kv-val">${esc(String(val))}</span></div>`;
}

// Strip filename prefix (e.g. "compute_bound_branch__") from a node id
function cleanId(id) {
  const i = id.indexOf('__');
  return i >= 0 ? id.slice(i + 2) : id;
}

function showDetail(node) {
  detail.classList.remove('collapsed');
  detailTitle.textContent = cleanId(node.id).replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

  let html = '';

  if (node.kind === 'root') {
    html += `<div class="detail-section">
      <span class="badge badge-root">GROUP ROOT</span>
      ${node.description ? `<p style="margin-top:6px">${esc(node.description)}</p>` : ''}
    </div>`;

  } else if (node.kind === 'decision') {
    html += `<div class="detail-section">
      <span class="badge badge-decision">DECISION NODE</span>
      ${node.description ? `<p style="margin-top:6px">${esc(node.description)}</p>` : ''}
    </div>`;

    const mtypeBadge = node.metric_type !== 'simple'
      ? `<span class="badge-type">${esc(node.metric_type)}</span>` : '';
    html += `<div class="detail-section">
      <h3>Metric ${mtypeBadge}</h3>
      <div class="metric-expr">${esc(node.metric_description)}</div>
      <div style="margin-top:8px">${kv('Aggregation', node.aggregation)}</div>
    </div>`;
    html += `<div class="detail-section">
      <h3>Threshold condition</h3>
      <p>value &nbsp;<strong>${esc(node.operator)}</strong>&nbsp; ${esc(node.threshold)}</p>
    </div>`;

  } else {
    const isNone = node.bottleneck_type === 'NONE';
    html += `<div class="detail-section">
      <span class="badge ${isNone ? 'badge-none' : 'badge-bottleneck'}">${esc(node.bottleneck_type)}</span>
      ${node.description ? `<p style="margin-top:6px">${esc(node.description)}</p>` : ''}
    </div>`;
    html += `<div class="detail-section">
      <h3>Diagnosis</h3>
      ${kv('Severity', node.severity_formula)}
      ${kv('Threshold', node.threshold)}
      ${kv('Confidence', node.confidence)}
    </div>`;
    if (node.recommendation) {
      html += `<div class="detail-section">
        <h3>Recommendation</h3>
        <pre>${esc(node.recommendation)}</pre>
      </div>`;
    }
  }
  detailBody.innerHTML = html;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// D3 hierarchy
// ============================================================
function buildHierarchy(tree) {
  const nodeMap = {};
  tree.nodes.forEach(n => { nodeMap[n.id] = { ...n, children: [] }; });
  tree.edges.forEach(e => {
    if (nodeMap[e.source] && nodeMap[e.target])
      nodeMap[e.source].children.push({ ...nodeMap[e.target], edgeLabel: e.label });
  });
  const targets = new Set(tree.edges.map(e => e.target));
  const rootId  = tree.nodes.find(n => !targets.has(n.id))?.id;
  if (!rootId) return null;

  function build(id, edgeLabel) {
    const n = nodeMap[id];
    const out = { ...n, edgeLabel };
    out.children = (n.children || []).map(c => build(c.id, c.edgeLabel));
    return out;
  }
  return build(rootId, '');
}

// ============================================================
// Render
// ============================================================
function renderTree(idx) {
  const tree = TREES[idx];
  const svg  = d3.select('#tree-svg');
  svg.selectAll('*').remove();
  closeDetail();

  // ---- arrowhead marker ----
  const defs = svg.append('defs');
  defs.append('marker')
    .attr('id', 'arr')
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 9)
    .attr('refY', 0)
    .attr('markerWidth', 7)
    .attr('markerHeight', 7)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-5L10,0L0,5')
    .attr('fill', '#4a90d9');

  const hier = buildHierarchy(tree);
  if (!hier) {
    svg.append('text').attr('x', 40).attr('y', 40).text('Empty tree').attr('fill', '#dc2626');
    return;
  }

  const root = d3.hierarchy(hier);
  d3.tree()
    .nodeSize([NODE_H + V_GAP, NODE_W + H_GAP])
    .separation((a, b) => a.parent === b.parent ? 1 : 1.35)
    (root);

  // Swap axes: tree grows left → right
  root.each(d => { const t = d.x; d.x = d.y; d.y = t; });

  const g = svg.append('g').attr('class', 'canvas');

  // ---- zoom & pan ----
  const zoom = d3.zoom()
    .scaleExtent([0.05, 5])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  // Initial fit-to-view
  const svgEl = document.getElementById('tree-svg');
  const W = svgEl.clientWidth  || (window.innerWidth  - 360);
  const H = svgEl.clientHeight || (window.innerHeight - 46);
  const xs = root.descendants().map(d => d.x);
  const ys = root.descendants().map(d => d.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const tW = maxX - minX + NODE_W + 40;
  const tH = maxY - minY + NODE_H + 40;
  const sc = Math.min(0.88, W / tW, H / tH);
  const tx = (W - tW * sc) / 2 - minX * sc + 20 * sc;
  const ty = (H - tH * sc) / 2 - minY * sc + 20 * sc;
  svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(sc));

  // Anchor helpers
  const srcX = d => d.x + NODE_W;
  const srcY = d => d.y + NODE_H / 2;
  const tgtX = d => d.x;
  const tgtY = d => d.y + NODE_H / 2;

  // S-curve bezier
  function linkPath(link) {
    const x1 = srcX(link.source), y1 = srcY(link.source);
    const x2 = tgtX(link.target), y2 = tgtY(link.target);
    const mx = (x1 + x2) / 2;
    return `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
  }

  // Edge label position: 38% from source toward target
  function labelX(link) { return srcX(link.source) * 0.62 + tgtX(link.target) * 0.38; }
  function labelY(link) { return srcY(link.source) * 0.62 + tgtY(link.target) * 0.38; }
  // Offset: above the line for upward edges, below for downward edges
  function labelDy(link) {
    return tgtY(link.target) > srcY(link.source) ? 14 : -5;
  }

  // ---- links ----
  const linkG = g.append('g');

  linkG.selectAll('path.lnk')
    .data(root.links())
    .join('path')
    .attr('class', 'lnk')
    .attr('fill', 'none')
    .attr('stroke', '#4a90d9')
    .attr('stroke-width', 1.6)
    .attr('marker-end', 'url(#arr)')
    .attr('d', linkPath);

  linkG.selectAll('text.el')
    .data(root.links())
    .join('text')
    .attr('class', 'el')
    .attr('font-size', 10.5)
    .attr('font-family', "'Computer Modern', 'CMU Serif', Georgia, serif")
    .attr('fill', '#475569')
    .attr('font-weight', 600)
    .attr('text-anchor', 'middle')
    .attr('x', labelX)
    .attr('y', d => labelY(d) + labelDy(d))
    .text(d => d.target.data.edgeLabel || '');

  // ---- nodes ----
  const nodeG = g.append('g');

  const nodes = nodeG.selectAll('g.node')
    .data(root.descendants())
    .join('g')
    .attr('class', 'node')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .style('cursor', 'pointer')
    .call(d3.drag()
      .on('start', function() { d3.select(this).raise(); })
      .on('drag', function(event, d) {
        d.x += event.dx;
        d.y += event.dy;
        d3.select(this).attr('transform', `translate(${d.x},${d.y})`);
        linkG.selectAll('path.lnk').attr('d', linkPath);
        linkG.selectAll('text.el')
          .attr('x', labelX)
          .attr('y', d2 => labelY(d2) + labelDy(d2));
      })
    )
    .on('click', function(event, d) {
      event.stopPropagation();
      if (selectedNode) selectedNode.classed('node-highlight', false);
      selectedNode = d3.select(this);
      selectedNode.classed('node-highlight', true);
      showDetail(d.data);
    });

  // Rect + text per node
  nodes.each(function(d) {
    const g2 = d3.select(this);
    const st = nodeStyle(d.data);

    g2.append('rect')
      .attr('class', 'node-shape')
      .attr('width', NODE_W)
      .attr('height', NODE_H)
      .attr('rx', st.rx)
      .attr('ry', st.rx)
      .attr('fill', st.fill)
      .attr('stroke', st.stroke)
      .attr('stroke-width', d.data.kind === 'root' ? 2 : 1.5)
      .attr('filter', d.data.kind === 'root'
        ? 'drop-shadow(0 2px 6px rgba(37,99,235,.18))'
        : 'drop-shadow(0 1px 3px rgba(0,0,0,.08))');

    // Word-wrap label
    const label = d.data.label || cleanId(d.data.id).replace(/_/g, ' ');
    const words = label.split(/\s+/);
    const maxCpl = 20;
    const lines = [];
    let cur = '';
    for (const w of words) {
      const candidate = cur ? cur + ' ' + w : w;
      if (candidate.length > maxCpl && cur) {
        lines.push(cur); cur = w;
      } else {
        cur = candidate;
      }
    }
    if (cur) lines.push(cur);

    const lineH  = 14;
    const totalH = lines.length * lineH;
    const startY = (NODE_H - totalH) / 2 + lineH * 0.85;
    const isOk   = d.data.kind === 'leaf' && d.data.bottleneck_type === 'NONE';

    lines.forEach((line, i) => {
      g2.append('text')
        .attr('x', NODE_W / 2)
        .attr('y', startY + i * lineH)
        .attr('text-anchor', 'middle')
        .attr('fill', '#1a202c')
        .attr('font-size', isOk ? 13 : 11.5)
        .attr('font-weight', st.fw)
        .attr('font-family', "'Computer Modern', 'CMU Serif', Georgia, serif")
        .style('pointer-events', 'none')
        .text(line);
    });
  });

  // Click on blank SVG → deselect
  svg.on('click', closeDetail);
}

// ============================================================
// Boot
// ============================================================
renderTree(0);
</script>
</body>
</html>
