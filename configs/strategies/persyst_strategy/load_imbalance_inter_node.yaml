# =============================================================================
# Strategy Tree — Load Imbalance: Inter-Node
# =============================================================================

tree_name: load_imbalance_inter_node
description: >
  Detects inter-node load imbalance using the Load Imbalance Factor
  LIF = (T_max - T_avg) / T_max computed across all compute nodes.
  LIF is dimensionless in [0, 1]: 0 means perfect balance, 1 means all work
  on one node.

required_metrics:
  - group: load_imbalance
    metric: FLOPS
    trace: inter_node

root:
  node_id: check_inter_node_imbalance
  description: "Is mean inter-node LIF high?"
  metric:
    group: load_imbalance
    metric: FLOPS
    trace: inter_node
  aggregation: mean
  operator: ">"
  threshold: 0.5

  if_true:
    node_id: inter_node_load_imbalance_detected
    diagnosis:
      bottleneck_type: INTER_NODE_LOAD_IMBALANCE
      severity_formula: INCREASING
      threshold: 0.5
      confidence: 1.0
      recommendation: >
        Inter-node load imbalance detected: the mean Load Imbalance Factor
        (LIF = (T_max - T_avg) / T_max) across nodes  exceeds the threshold.
        Recommended actions:
          - Perform an in-depth analysis of the parallel paradigm (MPI, task-
            based, data-parallel) to locate the root cause of skew.
          - Implement non-blocking communications (MPI_Isend/Irecv) to overlap
            computation and communication, reducing synchronisation stalls.
          - Evaluate a Dynamic Load Balancing (DLB) scheme to redistribute
            work at runtime when data or computation is irregular.
          - Profile with Score-P, Scalasca, or Intel Trace Analyzer to
            identify the overloaded rank(s) and the communication pattern
            driving the imbalance.
          - Review data distribution strategies: uneven partitioning of
            domains or arrays leads directly to imbalanced node workloads.

  if_false:
    node_id: no_inter_node_imbalance
    diagnosis:
      bottleneck_type: NONE
      severity_formula: "0.0"
      confidence: 1.0
      recommendation: null
