# =============================================================================
# Strategy Tree — Load Imbalance: Intra-Node
# =============================================================================

tree_name: load_imbalance_intra_node
description: >
  Detects intra-node load imbalance using the Load Imbalance Factor
  LIF = (T_max - T_avg) / T_max computed across all cores within a node.
  LIF is dimensionless in [0, 1]: 0 means perfect balance, 1 means all work
  concentrated on a single core.

required_metrics:
  - group: load_imbalance
    metric: FLOPS
    trace: intra_node

root:
  node_id: check_intra_node_imbalance
  description: "Is mean LIF high?"
  metric:
    group: load_imbalance
    metric: FLOPS
    trace: intra_node
  aggregation: mean
  operator: ">"
  threshold: 0.5

  if_true:
    node_id: intra_node_load_imbalance_detected
    diagnosis:
      bottleneck_type: INTRA_NODE_LOAD_IMBALANCE
      severity_formula: INCREASING
      threshold: 0.5
      confidence: 1.0
      recommendation: >
        Significant intra-node load imbalance detected: the mean Load Imbalance
        Factor (LIF = (T_max - T_avg) / T_max) across cores exceeds threshold.
        Recommended actions:
          - Profile thread/process workload distribution using Intel VTune,
            perf, or Extrae to find which cores are idle and why.
          - Check for uneven loop-iteration distribution in OpenMP parallel
            regions; replace static scheduling with dynamic or guided.
          - Look for serialisation points (critical sections, barriers,
            reductions) that force a subset of cores to wait.
          - Investigate NUMA effects: cores on different sockets may experience
            different memory-access latencies, leading to asymmetric runtimes.
          - If using MPI with OpenMP, verify that thread affinity (OMP_PROC_BIND,
            numactl) pins threads in a NUMA-aware layout.

  if_false:
    node_id: no_intra_node_imbalance
    diagnosis:
      bottleneck_type: NONE
      severity_formula: "0.0"
      confidence: 1.0
      recommendation: null
