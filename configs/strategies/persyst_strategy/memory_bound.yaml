# =============================================================================
# Strategy Tree — Memory Bandwidth Gate & Memory-Bound Analysis
# =============================================================================

tree_name: memory_bound
description: >
  Root memory-bandwidth gate. If memory-bound, analyses data-locality indicators: loads/stores ratio, L2 miss ratio, and SP/DP precision use.

required_metrics:
  - group: memory
    metric: Bandwidth
    trace: total
  - group: memory
    metric: Load To Store Ratio
    trace: load to store
  - group: cache
    metric: Miss Ratio
    trace: L2 miss ratio
  - group: cpu
    metric: Vectorization
    trace: vectorization ratio SP

root:
  node_id: check_memory_bound
  description: "Is total DRAM bandwidth above the saturation threshold?"
  metric:
    group: memory
    metric: Bandwidth
    trace: total
  aggregation: mean
  operator: ">"
  threshold:
    benchmark: bandwidth_mem
    fraction: 0.85
    aggregate: mean
    fallback: 40.0 # Depends on hardware

  if_false:
    node_id: compute_bound_gate
    diagnosis:
      bottleneck_type: NONE
      severity_formula: "0.0"
      confidence: 1.0
      recommendation: >
        Memory bandwidth is below the saturation threshold -> the job is COMPUTE BOUND.

  if_true:
    node_id: check_loads_to_stores
    description: "High loads-to-stores ratio: is loaded data being underused?"
    metric:
      group: memory
      metric: Load To Store Ratio
      trace: load to store
    aggregation: mean
    operator: ">"
    threshold: 4.0

    if_true:
      node_id: loads_stores_bottleneck
      diagnosis:
        bottleneck_type: DATA_LOCALITY
        severity_formula: FORMULA1
        threshold: 4.0
        confidence: 1.0
        recommendation: >
          High loads-to-stores ratio: data is loaded but not efficiently used.
          Actions:
            - Improve temporal reuse: tile/block loops so the same data is consumed before it is evicted from cache.
            - Check for strided or irregular access patterns; restructure to sequential (Array of Structures (Aos) to Structure of Arrays (Soa)).
            - In OpenMP codes, verify first-touch allocation so threads work on the same NUMA domain where data was initialised.

    if_false:
      node_id: check_l2_miss_ratio
      description: "High L2 miss ratio: is there poor spatial/temporal locality?"
      metric:
        group: cache
        metric: Miss Ratio
        trace: L2 miss ratio
      aggregation: mean
      operator: ">"
      threshold: 0.20

      if_true:
        node_id: cache_locality_bottleneck
        diagnosis:
          bottleneck_type: DATA_LOCALITY
          severity_formula: FORMULA1
          threshold: 0.20
          confidence: 1.0
          recommendation: >
            High L2 miss ratio with elevated memory bandwidth: data is frequently missing the cache hierarchy.
            Actions:
              - Improve spatial locality: prefer sequential access; restructure data (Array of Structures (AoS) to Structure of Arrays (SoA) where beneficial).
              - Improve temporal locality: use loop tiling/blocking to keepvworking sets in L2/L3.
              - Review first-touch NUMA policy in multi-socket codes.

      if_false:
        node_id: check_sp_dp_ratio
        description: >
          Low SP vectorisation ratio: is the code predominantly using double
          precision when single precision would suffice?
        metric:
          group: cpu
          metric: Vectorization
          trace: vectorization ratio SP
        aggregation: mean
        operator: "<"
        threshold: 0.50

        if_true:
          node_id: sp_dp_recommendation
          diagnosis:
            bottleneck_type: DATA_LOCALITY
            severity_formula: FORMULA2
            threshold: 0.50
            confidence: 1.0
            recommendation: >
              The job is memory-bound and predominantly uses double precision. If numerical stability allows, migrating to single precision halves the memory footprint and memory traffic, potentially shifting the code from memory-bound to compute-bound. Verify accuracy requirements before applying this change.

        if_false:
          node_id: memory_bound_generic
          diagnosis:
            bottleneck_type: DATA_LOCALITY
            severity_formula: FORMULA1
            threshold: 0.50
            confidence: 1.0
            recommendation: >
              Job is memory-bound but no specific data-locality indicator triggered. Memory bandwidth is near saturation and the code may already be well-optimised for data movement. Use profiling tools like VTune for a finer-grained diagnosis.
