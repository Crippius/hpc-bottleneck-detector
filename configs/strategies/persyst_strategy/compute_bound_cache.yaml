# =============================================================================
# Strategy Tree — Compute-Bound: L3 Cache Pressure & Data Locality
# =============================================================================

tree_name: compute_bound_cache
description: >
  Detects L3 cache pressure and poor data locality in compute-bound code.

required_metrics:
  - group: cache
    metric: Bandwidth
    trace: L3 bandwidth
  - group: cache
    metric: Miss Rate
    trace: L3 miss rate
  - group: cache
    metric: Miss Ratio
    trace: L3 miss ratio

root:
  node_id: check_l3_bandwidth
  description: "Is L3 bandwidth elevated relative to measured peak?"
  metric:
    group: cache
    metric: Bandwidth
    trace: L3 bandwidth
  aggregation: mean
  operator: ">"
  threshold:
    benchmark: bandwidth_l3
    fraction: 0.2
    aggregate: mean
    fallback: 1.54 # GB/s

  if_false:
    node_id: low_l3_activity
    diagnosis:
      bottleneck_type: NONE
      severity_formula: "0.0"
      confidence: 1.0
      recommendation: null

  if_true:
    node_id: check_l3_miss_rate
    description: "Is the L3 miss rate (misses/instructions) above threshold?"
    metric:
      group: cache
      metric: Miss Rate
      trace: L3 miss rate
    aggregation: mean
    operator: ">"
    threshold: 0.6

    if_false:
      node_id: l3_bw_no_miss_pressure
      diagnosis:
        bottleneck_type: NONE
        severity_formula: "0.0"
        confidence: 1.0
        recommendation: >
          L3 bandwidth is elevated but L3 miss rate is low. Hardware prefetching is likely masking latency effectively. No immediate action required; monitor for sustained increases.

    if_true:
      node_id: check_l3_miss_ratio
      description: "Is the L3 miss ratio HIGH (poor cache hit rate)?"
      metric:
        group: cache
        metric: Miss Ratio
        trace: L3 miss ratio
      aggregation: mean
      operator: ">"
      threshold: 0.741

      if_true:
        node_id: severe_cache_locality
        diagnosis:
          bottleneck_type: DATA_LOCALITY
          severity_formula: INCREASING
          threshold: 0.741
          confidence: 1.0
          recommendation: >
            L3 bandwidth is high, L3 miss rate is elevated, and the L3 miss ratio exceeds 0.741
            (hits-to-misses below 0.35): the cache hierarchy is suffering from severe locality problems.
            Actions:
              - Tiling/blocking: restructure loops so each tile's working set fits in L2 or L3
                (e.g. cache-oblivious matrix multiply).
              - Replace gather/scatter patterns with sequential access; use Structure of Arrays (SoA)
                layout instead of Array of Structures (AoS).
              - Fuse loops that access the same data to avoid re-loading it from memory.
              - In multi-socket codes, ensure first-touch allocation places data on the socket that
                will process it (NUMA affinity).

      if_false:
        node_id: cache_pressure_indepth
        diagnosis:
          bottleneck_type: COMPUTE_BOUND_INEFFICIENCY
          severity_formula: INCREASING
          threshold: 0.6
          confidence: 1.0
          recommendation: >
            L3 bandwidth and L3 miss rate are elevated but the miss ratio is below 0.741
            (hits-to-misses still acceptable). Hardware prefetching may be partially hiding latency.
            In-depth analysis recommended:
              - Profile with Intel VTune or perf to identify the specific functions driving L3 traffic.
              - Apply loop tiling to the hottest data-access kernels.
              - Check prefetch distances and verify hardware prefetchers are not thrashing.
              - Cross-reference with compute_bound_cpi tree: elevated CPI alongside this signal
                confirms memory-latency root cause.
