# =============================================================================
# Strategy Tree — Compute-Bound: CPI & FLOP Rate
# =============================================================================

tree_name: compute_bound_cpi
family: compute_bound
description: >
  Detects pipeline stall overhead in compute-bound code via CPI.

required_metrics:
  - group: cpu
    metric: CPI
    trace: CPI

thresholds:
  cpi: 10 # high CPI

root:
  node_id: check_cpi
  description: "Is CPI above 10 (pipeline not being fed efficiently)?"
  metric:
    group: cpu
    metric: CPI
    trace: CPI
  aggregation: mean
  operator: ">"
  threshold: 10

  if_true:
    node_id: high_cpi
    diagnosis:
      bottleneck_type: PIPELINE_STALL
      severity_formula: INCREASING
      threshold: 10
      confidence: 1.0
      recommendation: >
        CPI is high: the processor is stalling frequently or the instruction stream is inefficient. In-depth analysis required.
        Recommended actions:
          - Use Top-Down Microarchitecture Analysis (TMA) with Intel VTune or perf to identify whether the bottleneck is front-end bound, back-end bound, bad speculation, or retiring.
          - Cross-reference with compute_bound_cache: high L3 BW and L2 miss rate would confirm a memory-latency root cause.
          - Check for serialising instructions (CPUID, memory fences, atomic ops, lock prefixes) in hot loops.
          - Evaluate if Simultaneous Multi-Threading (SMT / Hyper-Threading) could fill idle pipeline slots.

  if_false:
    node_id: low_cpi
    diagnosis:
      bottleneck_type: NONE
      severity_formula: "0.0"
      confidence: 1.0
      recommendation: null
