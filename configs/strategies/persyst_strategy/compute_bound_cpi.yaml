# =============================================================================
# Strategy Tree — Compute-Bound: CPI & FLOP Rate
# =============================================================================

tree_name: compute_bound_cpi
description: >
  Evaluates CPI vs total FLOP rate: high CPI -> pipeline bottleneck; low CPI + low FLOP rate -> object instantiation overhead.

required_metrics:
  - group: cpu
    metric: CPI
    trace: CPI
  - group: cpu
    metric: FLOPS
    trace: SP
  - group: cpu
    metric: FLOPS
    trace: DP

thresholds:
  # Benchmark-derived:
  flop_rate_peak_fraction: 0.10 # flag if (SP + DP) FLOPS < 15 % of peakflops
  # Hardware-independent ratios:
  cpi: 10 # high CPI

root:
  # Is CPI high?
  node_id: check_cpi
  description: "Is CPI above 10 (pipeline not being fed efficiently)?"
  metric:
    group: cpu
    metric: CPI
    trace: CPI
  aggregation: mean
  operator: ">"
  threshold: 10

  if_true:
    node_id: high_cpi
    diagnosis:
      bottleneck_type: PIPELINE_STALL
      severity_formula: INCREASING
      threshold: 10
      confidence: 1.0
      recommendation: >
        CPI is high: the processor is stalling frequently or the instruction stream is inefficient. In-depth analysis required.
        Recommended actions:
          - Use Top-Down Microarchitecture Analysis (TMA) with Intel VTune or perf to identify whether the bottleneck is front-end bound, back-end bound, bad speculation, or retiring.
          - Cross-reference with compute_bound_cache: high L3 BW and L2 miss rate would confirm a memory-latency root cause.
          - Check for serialising instructions (CPUID, memory fences, atomic ops, lock prefixes) in hot loops.
          - Evaluate if Simultaneous Multi-Threading (SMT / Hyper-Threading) could fill idle pipeline slots.

  if_false:
    node_id: check_flop_rate_for_cpi
    description: "With CPI normal, is the total FLOP rate also above threshold?"
    metric:
      type: sum
      operands:
        - group: cpu
          metric: FLOPS
          trace: SP
        - group: cpu
          metric: FLOPS
          trace: DP
    aggregation: mean
    operator: ">"
    threshold:
      benchmark: peakflops
      fraction: 0.1
      aggregate: mean
      fallback: 10.0

    if_true:
      node_id: good_cpi_and_flops
      diagnosis:
        bottleneck_type: NONE
        severity_formula: "0.0"
        confidence: 1.0
        recommendation: null

    if_false:
      node_id: object_instantiation_overhead
      diagnosis:
        bottleneck_type: PIPELINE_STALL
        severity_formula: DECREASING
        threshold: 0.1
        confidence: 1.0
        recommendation: >
          CPI is within normal range but the total FLOP rate is a small fraction of peak. The processor is executing instructions efficiently but doing very little floating-point work.
          Typical causes:
            - Heavy C++ object construction/destruction in hot paths (constructor chains, std::vector reallocations, move semantics).
            - Frequent virtual function dispatch or RTTI in inner loops.
            - Excessive dynamic memory allocation (malloc/free/new/delete) triggering allocator overhead and cache misses.
          Recommended actions:
            - Profile with perf or VTune focusing on instruction mix: a high fraction of integer/control instructions vs FP points to non-computational hot paths.
            - Use object pools or arena allocators to eliminate allocator overhead in performance-critical sections.
            - Replace virtual dispatch with CRTP or policy-based templates in inner loops to allow inlining.
