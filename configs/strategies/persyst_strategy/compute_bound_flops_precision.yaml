# =============================================================================
# Strategy Tree — Compute-Bound: FLOPs Precision Path
# =============================================================================

tree_name: compute_bound_flops_precision
description: >
  When total FP rate is a small fraction of peak, checks the SP-to-DP ratio.
  If the code is predominantly DP, recommends switching to single precision
  to double SIMD throughput.

required_metrics:
  - group: cpu
    metric: FLOPS
    trace: SP
  - group: cpu
    metric: FLOPS
    trace: DP

thresholds:
  # Benchmark-derived:
  flop_rate_peak_fraction: 0.15 # flag if (SP + DP) FLOPS < 15 % of peakflops
  # Hardware-independent (Carías Table 7.12 "SP to DP Ratio", Statistics 20th pct):
  sp_to_dp_ratio: 0.035 # SP FLOPS / DP FLOPS; < 0.035 = predominantly DP

root:
  node_id: check_total_flop_rate_prec
  description: "Is total FLOP rate (SP + DP) small fraction of peak?"
  metric:
    type: sum
    operands:
      - group: cpu
        metric: FLOPS
        trace: SP
      - group: cpu
        metric: FLOPS
        trace: DP
  aggregation: mean
  operator: "<"
  threshold:
    benchmark: peakflops
    fraction: 0.15
    aggregate: mean
    fallback: 10.0

  if_false:
    node_id: good_flop_rate_prec
    diagnosis:
      bottleneck_type: NONE
      severity_formula: "0.0"
      confidence: 1.0
      recommendation: null

  if_true:
    node_id: check_sp_to_dp_ratio
    description: "Is the SP/DP FLOPS ratio low (code is predominantly DP)?"
    metric:
      type: ratio
      numerator:
        group: cpu
        metric: FLOPS
        trace: SP
      denominator:
        group: cpu
        metric: FLOPS
        trace: DP
    aggregation: mean
    operator: "<"
    threshold: 0.035

    if_false:
      node_id: precision_balance_indepth
      diagnosis:
        bottleneck_type: COMPUTE_BOUND_INEFFICIENCY
        severity_formula: DECREASING
        threshold: 0.035
        confidence: 1.0
        recommendation: >
          Total FP rate is low but the SP/DP ratio is not dominated by double-precision.
          No precision inefficiency detected. Investigate other compute-bound root causes:
            - Check vectorisation quality.
            - Check CPI and pipeline stalls.
            - Use Intel VTune Top-Down Microarchitecture Analysis for fine-grained diagnosis.

    if_true:
      node_id: dp_only_code
      diagnosis:
        bottleneck_type: PRECISION_INEFFICIENCY
        severity_formula: DECREASING
        threshold: 0.035
        confidence: 1.0
        recommendation: >
          Total FP rate is a small fraction of peak and the code is predominantly double-precision. If the application's accuracy requirements allow:
            - Migrate hot kernels to single precision to halve the register and memory footprint, and double the SIMD lane count.
            - Mixed-precision strategies: use FP32 for intermediate results and FP64 only for accumulation where precision matters.
            - In memory-bound sub-problems, SP also halves memory bandwidth consumption, potentially shifting those paths to compute-bound.
          Verify numerical accuracy requirements before applying this change.
