# =============================================================================
# Strategy Tree — Compute-Bound: FLOPs Vectorisation Path
# =============================================================================

tree_name: compute_bound_flops_vectorization
description: >
  When total FP rate is a small fraction of peak, investigates vectorisation
  quality: scalar vs vector split, then AVX vs SSE split.

required_metrics:
  - group: cpu
    metric: FLOPS
    trace: SP
  - group: cpu
    metric: FLOPS
    trace: DP
  - group: cpu
    metric: FLOPS
    trace: AVX SP
  - group: cpu
    metric: FLOPS
    trace: AVX DP
  - group: cpu
    metric: SSE Operations
    trace: packed SP
  - group: cpu
    metric: SSE Operations
    trace: packed DP

thresholds:
  # Benchmark-derived:
  flop_rate_peak_fraction: 0.15 # flag if (SP + DP) FLOPS < 15 % of peakflops
  # Hardware-independent:
  vec_to_scalar: 0.50 # (AVX + SSE_packed) / total FLOPS
  avx_sse_ratio: 0.013 # (AVX_SP + AVX_DP) / (SSE_packed_SP + SSE_packed_DP)

root:
  node_id: check_total_flop_rate
  description: "Is total FLOP rate (SP + DP) a small fraction of peak?"
  metric:
    type: sum
    operands:
      - group: cpu
        metric: FLOPS
        trace: SP
      - group: cpu
        metric: FLOPS
        trace: DP
  aggregation: mean
  operator: "<"
  threshold:
    benchmark: peakflops
    fraction: 0.15
    aggregate: mean
    fallback: 10.0

  if_false:
    node_id: good_flop_rate_vec
    diagnosis:
      bottleneck_type: NONE
      severity_formula: "0.0"
      confidence: 1.0
      recommendation: null

  if_true:
    node_id: check_vec_to_scalar
    description: "Is the fraction of FLOPS executed as vector operations low?"
    metric:
      type: ratio
      numerator:
        type: sum
        operands:
          - group: cpu
            metric: FLOPS
            trace: AVX DP
          - group: cpu
            metric: FLOPS
            trace: AVX SP
      denominator:
        type: sum
        operands:
          - group: cpu
            metric: FLOPS
            trace: DP
          - group: cpu
            metric: FLOPS
            trace: SP
    aggregation: mean
    operator: "<"
    threshold: 0.50

    if_true:
      node_id: no_vectorization
      diagnosis:
        bottleneck_type: DATA_LEVEL_PARALLELISM
        severity_formula: DECREASING
        threshold: 0.50
        confidence: 1.0
        recommendation: >
          Total FP rate is low and less than 50 % of FLOPS are vectorised. The code is largely scalar - no data-level parallelism exploited.
          Actions:
            - Identify data-parallel loops and enable auto-vectorisation: -O2 -ftree-vectorize (GCC), or use Intel compiler -qopt-report.
            - Remove loop-carried dependencies that block vectorisation.
            - Restructure data from Array of Structures (AoS) to Structure of Arrays (SoA) for better SIMD alignment.
            - AVX-512: up to 16 SP or 8 DP ops per cycle.

    if_false:
      node_id: check_avx_sse_ratio
      description: "Is the AVX-to-SSE ratio below threshold (SSE dominates)?"
      metric:
        type: ratio
        numerator:
          type: sum
          operands:
            - group: cpu
              metric: FLOPS
              trace: AVX SP
            - group: cpu
              metric: FLOPS
              trace: AVX DP
        denominator:
          type: sum
          operands:
            - group: cpu
              metric: SSE Operations
              trace: packed SP
            - group: cpu
              metric: SSE Operations
              trace: packed DP
      aggregation: mean
      operator: "<"
      threshold: 0.013

      if_true:
        node_id: avx_flag_missing
        diagnosis:
          bottleneck_type: DATA_LEVEL_PARALLELISM
          severity_formula: DECREASING
          threshold: 0.013
          confidence: 1.0
          recommendation: >
            Vectorisation is present (SSE) but AVX operations are nearly absent. The hardware supports AVX but the code is not compiled to use it.
            Actions:
              - Recompile with -mavx2 (GCC/Clang) or -xAVX (Intel compiler).
              - Check for struct padding or memory alignment issues that disable 256-bit load/store paths.
              - Profile loops with Intel Advisor to identify AVX blockers.
            AVX doubles SIMD width (256-bit vs 128-bit), potentially doubling throughput for compute-limited kernels.

      if_false:
        node_id: vectorised_but_low_rate
        diagnosis:
          bottleneck_type: COMPUTE_BOUND_INEFFICIENCY
          severity_formula: DECREASING
          threshold: 0.15
          confidence: 1.0
          recommendation: >
            FP rate is a small fraction of peak despite good AVX vectorisation. A micro-architectural bottleneck is limiting throughput.
            Recommended in-depth analysis:
              - Check execution port utilisation with Intel VTune (TMA).
              - Look for serialising instructions (CPUID, RDTSC, fences) in hot loops preventing out-of-order execution.
              - Check for register pressure causing spills.
              - Cross-reference with compute_bound_cache and
                compute_bound_cpi trees for memory and pipeline signals.
